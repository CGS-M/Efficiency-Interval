<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SORA Eff Int - Carelon Services +</title>
  <style>
    :root{
      --border:#e5e7eb; --header:#111827; --muted:#6b7280;
      --bg:#fff; --bg2:#f9fafb; --hover:#f3f4f6; --focus:#2563eb;
    }
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);margin:24px;color:#111}
    h1{margin:0 0 8px;font-size:18px;color:var(--header)}
    .hint{color:var(--muted);margin-bottom:12px;font-size:13px}

    .toolbar{display:flex;gap:10px;align-items:center;margin:10px 0 12px;flex-wrap:wrap}
    .search{
      display:flex;align-items:center;gap:8px;border:1px solid var(--border);
      background:#fff;padding:8px 10px;border-radius:10px;min-width:280px;
    }
    .search label{font-size:13px;color:var(--muted)}
    .search input{border:none;outline:none;flex:1;font-size:13px;min-width:160px}
    .search:focus-within{border-color:var(--focus);box-shadow:0 0 0 3px rgba(37,99,235,.15)}
    button{
      border:1px solid var(--border);background:var(--bg2);padding:8px 10px;border-radius:8px;
      cursor:pointer;font-size:13px
    }
    button:hover{background:var(--hover)}

    .table-wrap{border:1px solid var(--border);border-radius:12px;overflow:auto;max-height:75vh}
    table{border-collapse:collapse;width:100%;min-width:1100px}
    thead th{
      position:sticky;top:0;background:var(--bg2);z-index:2;border-bottom:1px solid var(--border);
      text-align:left;font-weight:600;font-size:13px;padding:10px 10px;white-space:nowrap
    }
    tbody td{border-bottom:1px solid var(--border);padding:9px 10px;font-size:13px;white-space:nowrap}

    tr.parent{background:#fff;font-weight:650}
    tr.parent:hover{background:var(--hover)}
    /* First cell on parent rows is the clickable toggle */
    tr.parent td:first-child{cursor:pointer;user-select:none}
    tr.parent td:first-child:hover{background:var(--hover)}

    .lob-cell{display:flex;align-items:center;gap:8px}
    .chev{
      width:16px;height:16px;display:inline-flex;align-items:center;justify-content:center;
      border:1px solid var(--border);border-radius:6px;background:var(--bg2);font-size:11px;color:#111;flex:0 0 auto
    }
    tr.parent[aria-expanded="true"] .chev::before{content:"▼"}
    tr.parent[aria-expanded="false"] .chev::before{content:"▶"}

    tr.child td:first-child{padding-left:34px;color:#111;font-weight:500}
    tr.child.hidden{display:none}

    tr.filtered-out{display:none !important}
    .num{text-align:right;font-variant-numeric:tabular-nums}
  </style>
</head>
<body>
  <h1>SORA-Eff-Int.csv (Collapsible by LOB)</h1>
  <div class="hint">
    Click the <b>LOB cell</b> (first column) on a total row to expand/collapse.
  </div>

  <div class="toolbar">
    <div class="search" title="Filter by LOB name">
      <label for="lobSearch">Search LOB</label>
      <input id="lobSearch" type="text" placeholder="e.g. Subrogation, Ameriben, Legacy..." />
      <button id="clearSearch" type="button">Clear</button>
    </div>

    <button id="expandAll" type="button">Expand all</button>
    <button id="collapseAll" type="button">Collapse all</button>
  </div>

  <div class="table-wrap">
    <table id="tbl">
      <thead></thead>
      <tbody></tbody>
    </table>
  </div>

<script>
/* ---------- CSV parsing ---------- */
function parseCSV(text){
  const rows=[]; let row=[]; let cur=""; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i], next=text[i+1];
    if(ch === '"'){
      if(inQuotes && next === '"'){cur+='"'; i++;}
      else inQuotes=!inQuotes;
    } else if(ch === ',' && !inQuotes){
      row.push(cur); cur="";
    } else if((ch === '\n' || ch === '\r') && !inQuotes){
      if(ch === '\r' && next === '\n') i++;
      row.push(cur); cur="";
      if(row.some(v=>v.trim()!=="")) rows.push(row);
      row=[];
    } else cur+=ch;
  }
  if(cur.length || row.length){
    row.push(cur);
    if(row.some(v=>v.trim()!=="")) rows.push(row);
  }
  return rows;
}
function toNumberMaybe(v){
  const s=(v??"").toString().trim();
  if(s==="" || s.toLowerCase()==="nan") return s;
  if(s.endsWith("%")){
    const n=Number(s.slice(0,-1));
    return Number.isFinite(n)?n:s;
  }
  const n=Number(s);
  return Number.isFinite(n)?n:s;
}
function formatCell(v, headerName){
  if(typeof v==="number"){
    if(headerName.includes("%")) return v.toFixed(2)+"%";
    if(Number.isInteger(v)) return String(v);
    return v.toFixed(2);
  }
  return v;
}

/* ---------- Group logic for your file ---------- */
/* Parent rows are LOB that ends with "Grand Total" (your CSV has Interval as "nan" or "Interval") */
function isParentRow(obj){
  const lob=(obj["LOB"]??"").toString().trim().toLowerCase();
  return lob==="grand total" || lob.endsWith(" grand total") || lob.endsWith("grand total");
}
function baseLobName(lobVal){
  return (lobVal??"").toString().trim().replace(/\s*grand total\s*$/i,"");
}

/* ---------- State + rendering ---------- */
let CURRENT_FILTER = "";

async function loadAndRender(){
  const res = await fetch("./SORA-Eff-Int.csv");
  if(!res.ok) throw new Error("Failed to fetch CSV: "+res.status);
  const text = await res.text();

  const raw=parseCSV(text);
  if(raw.length<2) return;

  const headers=raw[0].map(h=>h.trim());
  const displayHeaders=headers.map(h=>h==="Unnamed: 1" ? "Interval" : h);

  const rows=raw.slice(1).map(r=>{
    const obj={};
    headers.forEach((h,i)=>obj[h]=(r[i]??"").trim());
    return obj;
  });

  const thead=document.querySelector("#tbl thead");
  const tbody=document.querySelector("#tbl tbody");

  // thead
  thead.innerHTML="";
  const trh=document.createElement("tr");
  displayHeaders.forEach(h=>{
    const th=document.createElement("th");
    th.textContent=h;
    trh.appendChild(th);
  });
  thead.appendChild(trh);

  // tbody
  tbody.innerHTML="";
  let currentGroupId=null;
  let groupIndex=0;

  rows.forEach(obj=>{
    const parent=isParentRow(obj);

    if(parent){
      currentGroupId = `g${groupIndex++}`;
      const lobBase = baseLobName(obj["LOB"]||"");

      const tr=document.createElement("tr");
      tr.className="parent";
      tr.dataset.group=currentGroupId;
      tr.dataset.lob=lobBase;
      tr.dataset.lobLower=lobBase.toLowerCase();
      tr.setAttribute("aria-expanded","true");

      headers.forEach((h,i)=>{
        const td=document.createElement("td");

        if(i===0){
          const wrap=document.createElement("div");
          wrap.className="lob-cell";
          const chev=document.createElement("span");
          chev.className="chev";
          const label=document.createElement("span");
          label.textContent=lobBase || "(blank)";
          wrap.appendChild(chev);
          wrap.appendChild(label);
          td.appendChild(wrap);
          // NOTE: no per-cell click handler here; we use event delegation below
        } else if(h==="Unnamed: 1"){
          td.textContent="Grand Total";
        } else {
          const val=toNumberMaybe(obj[h]);
          td.textContent=formatCell(val, displayHeaders[i]);
          if(typeof val==="number") td.classList.add("num");
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);

    } else {
      const tr=document.createElement("tr");
      tr.className="child";
      tr.dataset.parent=currentGroupId || "";

      headers.forEach((h,i)=>{
        const td=document.createElement("td");
        const val=toNumberMaybe(obj[h]);
        td.textContent=formatCell(val, displayHeaders[i]);
        if(typeof val==="number") td.classList.add("num");
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    }
  });

  applyFilter("");
}

function toggleGroup(groupId, forceExpand=null){
  const parentRow=document.querySelector(`tr.parent[data-group="${groupId}"]`);
  if(!parentRow) return;

  const children=Array.from(document.querySelectorAll(`tr.child[data-parent="${groupId}"]`));
  const expandedNow = parentRow.getAttribute("aria-expanded")==="true";
  const willExpand = (forceExpand===null) ? !expandedNow : !!forceExpand;

  parentRow.setAttribute("aria-expanded", willExpand ? "true" : "false");
  children.forEach(tr=>tr.classList.toggle("hidden", !willExpand));
}

function applyFilter(q){
  CURRENT_FILTER=(q??"").toString().trim().toLowerCase();
  const parents=Array.from(document.querySelectorAll("tr.parent"));

  parents.forEach(p=>{
    const matches = CURRENT_FILTER==="" || (p.dataset.lobLower||"").includes(CURRENT_FILTER);
    p.classList.toggle("filtered-out", !matches);

    const gid=p.dataset.group;
    const expanded = p.getAttribute("aria-expanded")==="true";
    const children=Array.from(document.querySelectorAll(`tr.child[data-parent="${gid}"]`));

    const showChildren = matches && expanded;
    children.forEach(c=>{
      c.classList.toggle("filtered-out", !matches);
      c.classList.toggle("hidden", !showChildren);
    });
  });
}

/* ---------- Event delegation: click only toggles when clicking first cell of a parent row ---------- */
document.querySelector("#tbl tbody").addEventListener("click", (e) => {
  const parentRow = e.target.closest("tr.parent");
  if(!parentRow) return;

  // only toggle if the click is inside the first TD
  const firstCell = parentRow.querySelector("td:first-child");
  if(firstCell && firstCell.contains(e.target)){
    toggleGroup(parentRow.dataset.group);
    applyFilter(CURRENT_FILTER);
  }
});

/* Keyboard: allow Enter/Space when focusing the first cell */
document.querySelector("#tbl tbody").addEventListener("keydown", (e) => {
  if(e.key !== "Enter" && e.key !== " ") return;
  const parentRow = e.target.closest("tr.parent");
  if(!parentRow) return;

  // only if focus is within the first cell
  const firstCell = parentRow.querySelector("td:first-child");
  if(firstCell && firstCell.contains(e.target)){
    e.preventDefault();
    toggleGroup(parentRow.dataset.group);
    applyFilter(CURRENT_FILTER);
  }
});

/* Make the first cell focusable for keyboard users */
function makeParentFirstCellsFocusable(){
  document.querySelectorAll("tr.parent td:first-child").forEach(td => td.tabIndex = 0);
}

/* ---------- UI wiring ---------- */
document.getElementById("expandAll").addEventListener("click", ()=>{
  document.querySelectorAll("tr.parent").forEach(p=>toggleGroup(p.dataset.group,true));
  applyFilter(CURRENT_FILTER);
});
document.getElementById("collapseAll").addEventListener("click", ()=>{
  document.querySelectorAll("tr.parent").forEach(p=>toggleGroup(p.dataset.group,false));
  applyFilter(CURRENT_FILTER);
});

const lobSearch=document.getElementById("lobSearch");
lobSearch.addEventListener("input", ()=>applyFilter(lobSearch.value));
document.getElementById("clearSearch").addEventListener("click", ()=>{
  lobSearch.value=""; lobSearch.focus(); applyFilter("");
});

/* Load */
loadAndRender()
  .then(() => makeParentFirstCellsFocusable())
  .catch(err=>{
    console.error(err);
    alert(
      "Failed to load CSV. For GitHub Pages, confirm:\n" +
      "1) GitHub Pages is enabled\n" +
      "2) index.html and SORA-Eff-Int.csv are in the published folder\n" +
      "3) the CSV filename/case matches exactly\n\n" +
      "Error: " + err.message
    );
  });
</script>
</body>
</html>
